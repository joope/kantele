  <button id="tuning-btn" aria-label="Tuning">&#9881;</button>
  <div id="tuning-panel">
    <h3>Tuning</h3>
    <div id="tune-rows"></div>
    <button class="reset-btn" id="tune-reset">Reset</button>
  </div>

  <script>
    // ─── Audio Engine ──────────────────────────────────────────────
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null;

    // ─── Sample Files ──────────────────────────────────────────────
    const SAMPLE_FILES = ['A_5.mp3', 'G_4.mp3', 'F%23_3.mp3', 'E_2.mp3', 'D.mp3'];
    const sampleBuffers = [null, null, null, null, null];
    const sampleRawData = [null, null, null, null, null];
    let samplesDecoded = false;

    // Prefetch raw audio data immediately (no AudioContext needed)
    const fetchPromise = Promise.all(SAMPLE_FILES.map(async (file, i) => {
      const resp = await fetch(file);
      sampleRawData[i] = await resp.arrayBuffer();
    }));

    let decodePromise = null;

    function decodeSamples() {
      if (decodePromise) return decodePromise;
      decodePromise = (async () => {
        await fetchPromise;
        await Promise.all(sampleRawData.map(async (raw, i) => {
          if (raw) sampleBuffers[i] = await audioCtx.decodeAudioData(raw);
        }));
      })();
      return decodePromise;
    }

    // Try to create context and decode eagerly (works on desktop;
    // on iOS the context will be suspended but decoding still works)
    try {
      audioCtx = new AudioCtx();
      fetchPromise.then(() => decodeSamples());
    } catch (e) { }

    function ensureAudio() {
      if (!audioCtx) {
        audioCtx = new AudioCtx();
        decodeSamples();
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }

    // ─── Tuning ──────────────────────────────────────────────────
    const STRING_NAMES = ['A', 'G', 'F♯', 'E', 'D'];
    const BASE_SEMITONES = [0, 0, 0, 0, 0]; // semitone offset per string
    let tuning = [...BASE_SEMITONES];

    function loadTuning() {
      try {
        const saved = JSON.parse(localStorage.getItem('kantele-tuning'));
        if (Array.isArray(saved) && saved.length === 5) tuning = saved;
      } catch (e) { }
    }
    function saveTuning() {
      localStorage.setItem('kantele-tuning', JSON.stringify(tuning));
    }
    function semitonesToRate(semitones) {
      return Math.pow(2, semitones / 12);
    }

    loadTuning();

    // ─── State ─────────────────────────────────────────────────────
    let activeVoices = [null, null, null, null, null];
    let stringVibration = [0, 0, 0, 0, 0];
    let stringMuteCount = [0, 0, 0, 0, 0];
    let muteVisual = [0, 0, 0, 0, 0];
    let mutePos = [0.5, 0.5, 0.5, 0.5, 0.5]; // where along the string (0..1) the finger is
    let isMobile = matchMedia('(pointer: coarse)').matches;

    // ─── Kantele Image ────────────────────────────────────────────
    const kanteleImg = new Image();
    kanteleImg.src = 'kantele.png';
    let imgLoaded = false;
    kanteleImg.onload = () => { imgLoaded = true; };

    // ─── String Positions (image-relative fractions) ──────────────
    const stringPositions = {
      bridge: [
        { x: 0.2025381068046608, y: 0.44744621828396547 },
        { x: 0.2025381068046608, y: 0.48149514728308646 },
        { x: 0.20324215862287462, y: 0.5125832998475012 },
        { x: 0.20394621044108843, y: 0.5466322288466222 },
        { x: 0.20465026225930227, y: 0.577720381411037 },
      ],
      peg: [
        { x: 0.6749568768261344, y: 0.35270137237336807 },
        { x: 0.7228324004646742, y: 0.4089561246327853 },
        { x: 0.7664836131939311, y: 0.46373048867484945 },
        { x: 0.8129510331960432, y: 0.5229460173689728 },
        { x: 0.8608265568345831, y: 0.5806811578457431 },
      ],
    };

    // ─── Synthesis ─────────────────────────────────────────────────
    function muteString(idx, pos) {
      if (stringMuteCount[idx] === 0) {
        stopString(idx);
      }
      stringMuteCount[idx]++;
      if (pos !== undefined) mutePos[idx] = pos;
    }

    function unmuteString(idx) {
      stringMuteCount[idx] = Math.max(0, stringMuteCount[idx] - 1);
    }

    function isStringMuted(idx) {
      return stringMuteCount[idx] > 0;
    }

    function pluckString(stringIndex, velocity = 0.7) {
      if (isStringMuted(stringIndex)) return;
      if (!sampleBuffers[stringIndex]) return;
      const ctx = ensureAudio();

      stopString(stringIndex);

      const source = ctx.createBufferSource();
      source.buffer = sampleBuffers[stringIndex];
      source.playbackRate.value = semitonesToRate(tuning[stringIndex]);

      const gainNode = ctx.createGain();
      gainNode.gain.value = velocity;

      source.connect(gainNode);
      gainNode.connect(ctx.destination);
      source.start();

      activeVoices[stringIndex] = { gain: gainNode, source, time: ctx.currentTime };
      triggerVibration(stringIndex, velocity);
    }

    function stopString(idx) {
      if (activeVoices[idx]) {
        try {
          const now = audioCtx.currentTime;
          activeVoices[idx].gain.gain.setValueAtTime(activeVoices[idx].gain.gain.value, now);
          activeVoices[idx].gain.gain.linearRampToValueAtTime(0, now + 0.05);
          activeVoices[idx].source.stop(now + 0.06);
        } catch (e) { }
        activeVoices[idx] = null;
      }
      stringVibration[idx] = 0;
    }

    function stopAll() {
      for (let i = 0; i < 5; i++) stopString(i);
    }

    function triggerVibration(idx, amplitude) {
      stringVibration[idx] = Math.max(stringVibration[idx], amplitude);
    }

    // ─── Canvas ────────────────────────────────────────────────────
    const canvas = document.getElementById('kantele');
    const ctx = canvas.getContext('2d');
    let W, H, dpr = window.devicePixelRatio || 1;
    let stringEndpoints = [];
    let stringHitAreas = [];
    let tuneKnobPositions = [];
    function resize() {
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width = W * dpr;
      canvas.height = H * dpr;
      canvas.style.width = W + 'px';
      canvas.style.height = H + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      isMobile = matchMedia('(pointer: coarse)').matches;
      zoomScale = 1; zoomX = 0; zoomY = 0;
      computeLayout();
    }

    let playZoomed = false; // true after user taps play on mobile

    function computeLayout() {
      const imgAspect = 4096 / 1948; // ~2.1:1

      let imgW, imgH;

      if (isMobile && H > W && playZoomed) {
        // Mobile portrait zoomed: fill screen height
        imgH = H;
        imgW = imgH * imgAspect;
      } else {
        // Default: fit to screen width (shows whole kantele)
        imgW = W;
        imgH = imgW / imgAspect;
      }

      const imgX = (W - imgW) / 2;
      const imgY = (H - imgH) / 2;

      const pos = stringPositions;
      stringEndpoints = [];
      stringHitAreas = [];

      for (let i = 0; i < 5; i++) {
        const x1 = imgX + pos.bridge[i].x * imgW;
        const y1 = imgY + pos.bridge[i].y * imgH;
        const x2 = imgX + pos.peg[i].x * imgW;
        const y2 = imgY + pos.peg[i].y * imgH;

        stringEndpoints.push({ x1, y1, x2, y2 });

        const gap = imgH * 0.06;
        const hitR = isMobile ? Math.max(gap * 1.2, 28) : Math.max(gap * 0.7, 16);
        stringHitAreas.push({ x1, y1, x2, y2, hitRadius: hitR });
      }

      tuneKnobPositions = [];
      for (let i = 0; i < 5; i++) {
        // Place knobs at the peg positions on the image
        tuneKnobPositions.push({
          x: imgX + pos.peg[i].x * imgW,
          y: imgY + pos.peg[i].y * imgH,
        });
      }

      computeLayout.body = { imgW, imgH, imgX, imgY };
    }

    function drawBody() {
      const b = computeLayout.body;
      if (!b || !imgLoaded) return;
      const { imgW, imgH, imgX, imgY } = b;

      ctx.save();
      ctx.shadowColor = 'rgba(0,0,0,0.5)';
      ctx.shadowBlur = 30;
      ctx.shadowOffsetY = 16;
      ctx.drawImage(kanteleImg, imgX, imgY, imgW, imgH);
      ctx.restore();
    }

    function getStringPath(ep, dx, dy, len, nx, ny, vib, time, i) {
      const points = [];
      const steps = 60;
      for (let s = 0; s <= steps; s++) {
        const t = s / steps;
        const x = ep.x1 + dx * t;
        const baseY = ep.y1 + dy * t;
        const envelope = Math.sin(t * Math.PI);
        const mode1 = Math.sin(t * Math.PI) * Math.sin(time * 25 + i);
        const mode2 = Math.sin(t * Math.PI * 2) * Math.sin(time * 38 + i) * 0.3;
        const displacement = vib * envelope * (mode1 + mode2) * 8;
        points.push({ x: x + nx * displacement, y: baseY + ny * displacement });
      }
      return points;
    }

    function tracePath(points) {
      ctx.beginPath();
      ctx.moveTo(points[0].x, points[0].y);
      for (let s = 1; s < points.length; s++) ctx.lineTo(points[s].x, points[s].y);
    }

    function drawStrings(time) {
      for (let i = 0; i < 5; i++) {
        const ep = stringEndpoints[i];
        const vib = stringVibration[i];
        const mute = muteVisual[i];
        const thickness = 0.4 + i * 0.28;

        ctx.save();

        const dx = ep.x2 - ep.x1;
        const dy = ep.y2 - ep.y1;
        const len = Math.hypot(dx, dy);
        const nx = -dy / len;
        const ny = dx / len;


        const points = getStringPath(ep, dx, dy, len, nx, ny, vib, time, i);
        const stillPoints = vib < 0.02 ? points : getStringPath(ep, dx, dy, len, nx, ny, 0, time, i);

        // Shadow underneath the string (subtle depth)
        // Use multiple passes for soft shadow (ctx.filter blur is unreliable on mobile)
        const shadowOff = 16;
        const shadowDx = nx * 2;
        const shadowDy = ny * 2 + shadowOff;
        for (let s = 3; s >= 0; s--) {
          const spread = s * 2.5;
          tracePath(points.map(p => ({ x: p.x + shadowDx, y: p.y + shadowDy })));
          ctx.strokeStyle = `rgba(100,50,10,${0.06 - s * 0.01})`;
          ctx.lineWidth = thickness + 2 + spread * 2;
          ctx.lineCap = 'round';
          ctx.stroke();
        }

        // Dark base layer — the core of the string
        tracePath(points);
        ctx.strokeStyle = '#555';
        ctx.lineWidth = thickness;
        ctx.lineCap = 'round';
        ctx.stroke();

        // Main metallic body — gradient along the perpendicular direction
        // We approximate this by drawing two thinner lines offset to simulate
        // a cylindrical highlight
        tracePath(points.map(p => ({ x: p.x - nx * thickness * 0.15, y: p.y - ny * thickness * 0.15 })));
        ctx.strokeStyle = '#aaa';
        ctx.lineWidth = thickness * 0.7;
        ctx.stroke();

        // Bright specular highlight — thin line along the top edge
        tracePath(points.map(p => ({ x: p.x - nx * thickness * 0.3, y: p.y - ny * thickness * 0.3 })));
        ctx.strokeStyle = 'rgba(255,255,255,0.6)';
        ctx.lineWidth = thickness * 0.25;
        ctx.stroke();

        // Vibration glow (multiple passes instead of ctx.filter for mobile compat)
        if (vib > 0.05) {
          const glowRadius = vib * 6;
          for (let g = 3; g >= 0; g--) {
            const spread = g * glowRadius * 0.5;
            tracePath(points);
            ctx.strokeStyle = `rgba(200,210,220,${vib * 0.1})`;
            ctx.lineWidth = thickness + vib * 12 + spread * 2;
            ctx.lineCap = 'round';
            ctx.stroke();
          }
        }

        // Fingertip on muted string
        if (mute > 0.3) {
          const ft = mutePos[i];
          const fx = ep.x1 + dx * ft;
          const fy = ep.y1 + dy * ft;
          const fingerR = isMobile ? 14 : 8 + (thickness - 1) * 2;
          ctx.beginPath();
          ctx.arc(fx, fy, fingerR * mute, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(180, 140, 110, ${mute * 0.5})`;
          ctx.fill();
          ctx.beginPath();
          ctx.arc(fx, fy, fingerR * mute * 0.6, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(80, 50, 30, ${mute * 0.3})`;
          ctx.fill();
        }

        ctx.restore();
      }
    }

    // ─── Tuning Knobs (on-canvas) ─────────────────────────────────
    const TUNE_KNOB_RADIUS = 12;
    let tuneKnobDrag = -1; // index of knob being dragged, -1 = none
    let tuneKnobDragStartY = 0;
    let tuneKnobDragStartVal = 0;
    let tuneKnobDragTouchId = null; // touch identifier for knob drag

    function drawTuneKnobs() {
      for (let i = 0; i < 5; i++) {
        const kp = tuneKnobPositions[i];
        const r = TUNE_KNOB_RADIUS;
        const active = tuneKnobDrag === i;

        // Solid knob
        ctx.beginPath();
        ctx.arc(kp.x, kp.y, r, 0, Math.PI * 2);
        ctx.fillStyle = active ? '#5a4a3a' : '#3d3028';
        ctx.fill();
        ctx.strokeStyle = '#6b5a48';
        ctx.lineWidth = 1.5;
        ctx.stroke();

        // Indicator line — points in direction matching the tuning value
        const angle = -Math.PI / 2 + tuning[i] * (Math.PI / 12);
        const ix = kp.x + Math.cos(angle) * r * 0.65;
        const iy = kp.y + Math.sin(angle) * r * 0.65;
        ctx.beginPath();
        ctx.moveTo(kp.x, kp.y);
        ctx.lineTo(ix, iy);
        ctx.strokeStyle = '#a08868';
        ctx.lineWidth = 1.5;
        ctx.lineCap = 'round';
        ctx.stroke();
      }
    }

    function hitTestTuneKnob(x, y) {
      for (let i = 0; i < 5; i++) {
        const kp = tuneKnobPositions[i];
        if (Math.hypot(x - kp.x, y - kp.y) <= TUNE_KNOB_RADIUS + 6) return i;
      }
      return -1;
    }

    function updatePlaybackRate(idx) {
      if (activeVoices[idx]) {
        activeVoices[idx].source.playbackRate.value = semitonesToRate(tuning[idx]);
      }
    }

    let tuneKnobDragStartX = 0;

    function applyTuneKnobDrag(x, y) {
      const dx = x - tuneKnobDragStartX;
      const dy = tuneKnobDragStartY - y;
      // Use whichever axis has more movement (right/up = higher pitch)
      const delta = Math.abs(dx) > Math.abs(dy) ? dx : dy;
      const semitones = Math.max(-12, Math.min(12, tuneKnobDragStartVal + delta * 0.05));
      tuning[tuneKnobDrag] = semitones;
      updatePlaybackRate(tuneKnobDrag);
      tuneSliders[tuneKnobDrag].value = semitones;
      tuneLabels[tuneKnobDrag].textContent = formatCents(semitones);
      saveTuning();
    }

    // ─── Animation Loop ────────────────────────────────────────────
    let lastTime = 0;

    function animate(timestamp) {
      const time = timestamp / 1000;
      const dt = time - lastTime;
      lastTime = time;

      ctx.save();
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.clearRect(0, 0, W, H);
      ctx.translate(zoomX, zoomY);
      ctx.scale(zoomScale, zoomScale);
      drawBody();
      drawStrings(time);
      drawTuneKnobs();
      ctx.restore();

      for (let i = 0; i < 5; i++) {
        if (stringVibration[i] > 0) {
          stringVibration[i] *= Math.pow(0.3, dt);
          if (stringVibration[i] < 0.005) stringVibration[i] = 0;
        }
        const target = isStringMuted(i) ? 1 : 0;
        muteVisual[i] += (target - muteVisual[i]) * Math.min(1, dt * 12);
      }

      requestAnimationFrame(animate);
    }

    // ─── Pinch Zoom ──────────────────────────────────────────────
    let zoomScale = 1;
    let zoomX = 0, zoomY = 0; // pan offset in screen pixels
    let pinchActive = false;
    let pinchStartDist = 0;
    let pinchStartScale = 1;
    let pinchStartMidX = 0, pinchStartMidY = 0;
    let pinchStartZoomX = 0, pinchStartZoomY = 0;

    function screenToCanvas(sx, sy) {
      return {
        x: (sx - zoomX) / zoomScale,
        y: (sy - zoomY) / zoomScale,
      };
    }

    function clampZoom() {
      zoomScale = Math.max(1, Math.min(5, zoomScale));
      // Clamp pan so we don't scroll past the canvas edges
      const maxPanX = (zoomScale - 1) * W / zoomScale;
      const maxPanY = (zoomScale - 1) * H / zoomScale;
      zoomX = Math.max(-maxPanX * zoomScale, Math.min(0, zoomX));
      zoomY = Math.max(-maxPanY * zoomScale, Math.min(0, zoomY));
    }

    // ─── Hit Testing ───────────────────────────────────────────────
    function pointToLineDistance(px, py, x1, y1, x2, y2) {
      const dx = x2 - x1;
      const dy = y2 - y1;
      const lenSq = dx * dx + dy * dy;
      let t = ((px - x1) * dx + (py - y1) * dy) / lenSq;
      t = Math.max(0, Math.min(1, t));
      const nearX = x1 + t * dx;
      const nearY = y1 + t * dy;
      return Math.hypot(px - nearX, py - nearY);
    }

    function hitTestString(x, y, radiusScale = 1) {
      let best = -1;
      let bestDist = Infinity;
      for (let i = 0; i < 5; i++) {
        const ha = stringHitAreas[i];
        const d = pointToLineDistance(x, y, ha.x1, ha.y1, ha.x2, ha.y2);
        if (d < ha.hitRadius * radiusScale && d < bestDist) {
          bestDist = d;
          best = i;
        }
      }
      return best;
    }

    // Position along string (0..1) closest to point
    function stringParamAt(stringIdx, x, y) {
      const ep = stringEndpoints[stringIdx];
      const dx = ep.x2 - ep.x1;
      const dy = ep.y2 - ep.y1;
      const lenSq = dx * dx + dy * dy;
      let t = ((x - ep.x1) * dx + (y - ep.y1) * dy) / lenSq;
      return Math.max(0, Math.min(1, t));
    }

    // ─── Touch Input ───────────────────────────────────────────────
    // Every finger on a string mutes it (like resting your finger on it).
    // Sound only happens when a finger MOVES across a string — the crossing
    // motion is the pluck. Lift finger = unmute that string.
    // This mirrors real kantele: left hand holds fingers still on strings
    // to dampen them, right hand sweeps across to sound the free ones.

    const activeTouches = new Map();

    function getScreenTouchPos(touch) {
      const rect = canvas.getBoundingClientRect();
      return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
    }

    function getTouchPos(touch) {
      const screen = getScreenTouchPos(touch);
      return screenToCanvas(screen.x, screen.y);
    }

    function getPinchInfo(touches) {
      const a = getScreenTouchPos(touches[0]);
      const b = getScreenTouchPos(touches[1]);
      return {
        dist: Math.hypot(a.x - b.x, a.y - b.y),
        midX: (a.x + b.x) / 2,
        midY: (a.y + b.y) / 2,
      };
    }

    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      ensureAudio();

      // Register new touches
      for (const touch of e.changedTouches) {
        const pos = getTouchPos(touch);
        const info = {
          lastX: pos.x, lastY: pos.y,
          startX: pos.x, startY: pos.y,
          mutedString: -1,
          lastPlucked: -1,
        };
        activeTouches.set(touch.identifier, info);
      }

      // If 2+ fingers → start pinch, but only if no finger is playing
      if (e.touches.length >= 2) {
        if (!pinchActive) {
          // Check if any finger is muting or has plucked a string
          let anyPlaying = false;
          for (const [, info] of activeTouches) {
            if (info.mutedString >= 0 || info.lastPlucked >= 0) {
              anyPlaying = true;
              break;
            }
          }
          if (!anyPlaying) {
            const p = getPinchInfo(e.touches);
            pinchStartDist = p.dist;
            pinchStartScale = zoomScale;
            pinchStartMidX = p.midX;
            pinchStartMidY = p.midY;
            pinchStartZoomX = zoomX;
            pinchStartZoomY = zoomY;
            pinchActive = true;
          }
        }
        if (pinchActive) return;
      }

      // Check tuning knobs first, then strings
      for (const touch of e.changedTouches) {
        const pos = getTouchPos(touch);
        const knobHit = hitTestTuneKnob(pos.x, pos.y);
        const info = activeTouches.get(touch.identifier);
        if (knobHit >= 0 && info) {
          tuneKnobDrag = knobHit;
          tuneKnobDragStartX = pos.x;
          tuneKnobDragStartY = pos.y;
          tuneKnobDragStartVal = tuning[knobHit];
          tuneKnobDragTouchId = touch.identifier;
          info.tuningKnob = true;
          continue;
        }
        const hit = hitTestString(pos.x, pos.y);
        if (hit >= 0 && info) {
          info.hitString = hit;
          info.touchTime = performance.now();
          // Delay mute — if released quickly it's a pluck instead
          const id = touch.identifier;
          info.muteTimer = setTimeout(() => {
            const i = activeTouches.get(id);
            if (i && i.hitString >= 0 && i.mutedString < 0) {
              i.mutedString = i.hitString;
              muteString(i.hitString, stringParamAt(i.hitString, i.lastX, i.lastY));
            }
          }, 100);
        }
      }
    }, { passive: false });

    canvas.addEventListener('touchmove', (e) => {
      e.preventDefault();

      if (pinchActive && e.touches.length >= 2) {
        const p = getPinchInfo(e.touches);
        const newScale = Math.max(1, Math.min(5, pinchStartScale * (p.dist / pinchStartDist)));

        // Zoom toward pinch midpoint
        // The point under the pinch midpoint should stay fixed
        const focusX = (pinchStartMidX - pinchStartZoomX) / pinchStartScale;
        const focusY = (pinchStartMidY - pinchStartZoomY) / pinchStartScale;

        zoomScale = newScale;
        zoomX = p.midX - focusX * zoomScale;
        zoomY = p.midY - focusY * zoomScale;

        // Also allow panning
        zoomX += (p.midX - pinchStartMidX) - (pinchStartMidX - pinchStartZoomX) * (newScale / pinchStartScale - 1);
        zoomY += (p.midY - pinchStartMidY) - (pinchStartMidY - pinchStartZoomY) * (newScale / pinchStartScale - 1);

        // Simpler: just compute directly
        zoomX = p.midX - focusX * zoomScale;
        zoomY = p.midY - focusY * zoomScale;

        clampZoom();
        return;
      }

      for (const touch of e.changedTouches) {
        const info = activeTouches.get(touch.identifier);
        if (!info) continue;
        const pos = getTouchPos(touch);

        // Handle tuning knob drag
        if (info.tuningKnob && tuneKnobDrag >= 0 && touch.identifier === tuneKnobDragTouchId) {
          applyTuneKnobDrag(pos.x, pos.y);
          continue;
        }

        const scale = info.mutedString >= 0 ? 0.15 : 1;
        const hit = hitTestString(pos.x, pos.y, scale);

        // Reset lastPlucked when finger moves away from that string
        if (info.lastPlucked >= 0 && hit !== info.lastPlucked) {
          info.lastPlucked = -1;
        }

        if (hit !== info.mutedString) {
          let justPluckedMuted = false;
          if (info.mutedString >= 0) {
            const plucked = info.mutedString;
            unmuteString(plucked);
            info.mutedString = -1;
            info.hitString = -1; // strummed off — prevent duplicate pluck on release
            if (!isStringMuted(plucked)) {
              pluckString(plucked, 0.45 + Math.random() * 0.2);
              info.lastPlucked = plucked;
              justPluckedMuted = true;
            }
          }

          if (!justPluckedMuted && hit >= 0 && hit !== info.lastPlucked) {
            info.lastPlucked = hit;
            info.hitString = -1; // strummed — prevent duplicate pluck on release
            pluckString(hit, 0.4 + Math.random() * 0.2);
          }
        }

        info.lastX = pos.x;
        info.lastY = pos.y;
      }
    }, { passive: false });

    canvas.addEventListener('touchend', (e) => {
      e.preventDefault();
      for (const touch of e.changedTouches) {
        const info = activeTouches.get(touch.identifier);
        if (!info) { activeTouches.delete(touch.identifier); continue; }

        if (info.tuningKnob && touch.identifier === tuneKnobDragTouchId) {
          tuneKnobDrag = -1;
          tuneKnobDragTouchId = null;
        }

        if (info.muteTimer) clearTimeout(info.muteTimer);

        if (info.mutedString >= 0) {
          // Was held long enough to mute — just unmute on release
          unmuteString(info.mutedString);
        } else if (info.hitString >= 0) {
          // Quick tap — pluck the string
          if (!isStringMuted(info.hitString)) {
            pluckString(info.hitString, 0.5 + Math.random() * 0.2);
          }
        }

        activeTouches.delete(touch.identifier);
      }

      // End pinch when fewer than 2 fingers remain
      if (e.touches.length < 2) {
        pinchActive = false;
      }
    });

    canvas.addEventListener('touchcancel', (e) => {
      for (const touch of e.changedTouches) {
        const info = activeTouches.get(touch.identifier);
        if (info) {
          if (info.muteTimer) clearTimeout(info.muteTimer);
          if (info.mutedString >= 0) unmuteString(info.mutedString);
        }
        activeTouches.delete(touch.identifier);
      }
      if (e.touches.length < 2) pinchActive = false;
    });

    // ─── Mouse Input ───────────────────────────────────────────────
    // Quick click = pluck. Hold = mute. Drag across = pluck crossed strings.
    let mouseDown = false;
    let mouseMutedString = -1;
    let mouseHitString = -1;
    let mouseMuteTimer = null;
    let mouseLastPlucked = -1;
    let mouseStartX = 0, mouseStartY = 0;
    let mouseLastX = 0, mouseLastY = 0;

    function getMousePos(e) {
      const rect = canvas.getBoundingClientRect();
      const sx = e.clientX - rect.left;
      const sy = e.clientY - rect.top;
      return screenToCanvas(sx, sy);
    }

    canvas.addEventListener('mousedown', (e) => {
      e.preventDefault();
      const pos = getMousePos(e);

      // Check tuning knobs first
      const knobHit = hitTestTuneKnob(pos.x, pos.y);
      if (knobHit >= 0) {
        tuneKnobDrag = knobHit;
        tuneKnobDragStartX = pos.x;
        tuneKnobDragStartY = pos.y;
        tuneKnobDragStartVal = tuning[knobHit];
        return;
      }

      ensureAudio();
      mouseDown = true;
      mouseStartX = pos.x; mouseStartY = pos.y;
      mouseLastX = pos.x; mouseLastY = pos.y;
      const hit = hitTestString(pos.x, pos.y);
      mouseLastPlucked = -1;
      mouseHitString = hit;
      if (hit >= 0) {
        // Delay mute — quick click will pluck instead
        mouseMuteTimer = setTimeout(() => {
          if (mouseHitString >= 0 && mouseMutedString < 0) {
            mouseMutedString = mouseHitString;
            muteString(mouseHitString, stringParamAt(mouseHitString, mouseLastX, mouseLastY));
          }
        }, 150);
      }
    });

    canvas.addEventListener('mousemove', (e) => {
      const pos = getMousePos(e);

      if (tuneKnobDrag >= 0) {
        applyTuneKnobDrag(pos.x, pos.y);
        return;
      }

      if (!mouseDown) return;
      const scale = mouseMutedString >= 0 ? 0.15 : 1;
      const hit = hitTestString(pos.x, pos.y, scale);

      // Reset lastPlucked when cursor moves away from that string
      if (mouseLastPlucked >= 0 && hit !== mouseLastPlucked) {
        mouseLastPlucked = -1;
      }

      if (hit !== mouseMutedString) {
        if (mouseMutedString >= 0) {
          const plucked = mouseMutedString;
          unmuteString(plucked);
          mouseMutedString = -1;
          if (!isStringMuted(plucked)) {
            pluckString(plucked, 0.45 + Math.random() * 0.2);
            mouseLastPlucked = plucked;
          }
        }

        if (hit >= 0 && hit !== mouseLastPlucked) {
          mouseLastPlucked = hit;
          pluckString(hit, 0.4 + Math.random() * 0.2);
        }
      }

      mouseLastX = pos.x; mouseLastY = pos.y;
    });

    canvas.addEventListener('mouseup', () => {
      tuneKnobDrag = -1;
      if (mouseMuteTimer) { clearTimeout(mouseMuteTimer); mouseMuteTimer = null; }
      if (mouseMutedString >= 0) {
        // Was held long enough to mute — just unmute on release
        unmuteString(mouseMutedString);
        mouseMutedString = -1;
      } else if (mouseHitString >= 0) {
        // Quick click — pluck the string
        if (!isStringMuted(mouseHitString)) {
          pluckString(mouseHitString, 0.5 + Math.random() * 0.2);
        }
      }
      mouseDown = false; mouseLastPlucked = -1; mouseHitString = -1;
    });
    canvas.addEventListener('mouseleave', () => {
      tuneKnobDrag = -1;
      if (mouseMuteTimer) { clearTimeout(mouseMuteTimer); mouseMuteTimer = null; }
      if (mouseMutedString >= 0) { unmuteString(mouseMutedString); mouseMutedString = -1; }
      mouseDown = false; mouseLastPlucked = -1; mouseHitString = -1;
    });

    // ─── Scroll-wheel Zoom (desktop) ────────────────────────────
    canvas.addEventListener('wheel', (e) => {
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const sx = e.clientX - rect.left;
      const sy = e.clientY - rect.top;

      const oldScale = zoomScale;
      const factor = e.deltaY < 0 ? 1.1 : 1 / 1.1;
      zoomScale = Math.max(1, Math.min(5, zoomScale * factor));

      // Zoom toward cursor
      zoomX = sx - (sx - zoomX) * (zoomScale / oldScale);
      zoomY = sy - (sy - zoomY) * (zoomScale / oldScale);
      clampZoom();
    }, { passive: false });

    // ─── Keyboard Input ────────────────────────────────────────────
    const MUTE_KEYS = ['q', 'w', 'e', 'r', 't'];
    const PLUCK_KEYS = ['1', '2', '3', '4', '5'];
    const keyMutes = new Set();

    document.addEventListener('keydown', (e) => {
      if (e.repeat) return;
      const k = e.key.toLowerCase();

      const muteIdx = MUTE_KEYS.indexOf(k);
      if (muteIdx >= 0 && !keyMutes.has(k)) {
        keyMutes.add(k);
        muteString(muteIdx);
        return;
      }

      const pluckIdx = PLUCK_KEYS.indexOf(e.key);
      if (pluckIdx >= 0) {
        pluckString(pluckIdx, 0.5 + Math.random() * 0.2);
        return;
      }

      if (e.key === ' ') {
        e.preventDefault();
        const delay = 8 + Math.random() * 12;
        for (let i = 0; i < 5; i++) {
          setTimeout(() => pluckString(i, 0.5 + Math.random() * 0.15), i * delay);
        }
      }
    });

    document.addEventListener('keyup', (e) => {
      const k = e.key.toLowerCase();
      const muteIdx = MUTE_KEYS.indexOf(k);
      if (muteIdx >= 0 && keyMutes.has(k)) {
        keyMutes.delete(k);
        unmuteString(muteIdx);
      }
    });

    // ─── Tuning UI ────────────────────────────────────────────────
    const tuningBtn = document.getElementById('tuning-btn');
    const tuningPanel = document.getElementById('tuning-panel');
    const tuneRows = document.getElementById('tune-rows');
    const tuneReset = document.getElementById('tune-reset');

    tuningBtn.addEventListener('click', () => {
      tuningPanel.classList.toggle('open');
      tuningBtn.classList.toggle('active');
    });

    // Prevent touch/mouse events on the panel from reaching the canvas
    tuningPanel.addEventListener('touchstart', (e) => e.stopPropagation(), { passive: false });
    tuningPanel.addEventListener('touchmove', (e) => e.stopPropagation(), { passive: false });
    tuningPanel.addEventListener('mousedown', (e) => e.stopPropagation());

    const tuneSliders = [];
    const tuneLabels = [];

    for (let i = 0; i < 5; i++) {
      const row = document.createElement('div');
      row.className = 'tune-row';

      const label = document.createElement('label');
      label.textContent = STRING_NAMES[i];

      const slider = document.createElement('input');
      slider.type = 'range';
      slider.min = -12;
      slider.max = 12;
      slider.step = 0.01;
      slider.value = tuning[i];

      const val = document.createElement('span');
      val.className = 'tune-val';
      val.textContent = formatCents(tuning[i]);

      slider.addEventListener('input', () => {
        tuning[i] = Number(slider.value);
        updatePlaybackRate(i);
        val.textContent = formatCents(tuning[i]);
        saveTuning();
      });

      row.appendChild(label);
      row.appendChild(slider);
      row.appendChild(val);
      tuneRows.appendChild(row);
      tuneSliders.push(slider);
      tuneLabels.push(val);
    }

    function formatCents(v) {
      const cents = Math.round(v * 100);
      if (cents === 0) return '0 ¢';
      return (cents > 0 ? '+' : '') + cents + ' ¢';
    }

    tuneReset.addEventListener('click', () => {
      for (let i = 0; i < 5; i++) {
        tuning[i] = 0;
        tuneSliders[i].value = 0;
        tuneLabels[i].textContent = formatCents(0);
      }
      saveTuning();
    });

    // ─── Start Overlay (mobile audio unlock) ──────────────────────
    const startOverlay = document.getElementById('start-overlay');
    if (!matchMedia('(pointer: coarse)').matches) {
      // Desktop — no overlay needed, remove immediately
      startOverlay.remove();
    } else {
      startOverlay.addEventListener('click', async (e) => {
        if (e.target.tagName === 'A') return; // let links work
        ensureAudio();
        await decodeSamples();
        startOverlay.classList.add('hidden');
        setTimeout(() => startOverlay.remove(), 400);

        // On mobile portrait, animate zoom into the strings
        if (H > W) {
          playZoomed = true;
          animateZoomIn();
        }
      });
    }

    // ─── Init ──────────────────────────────────────────────────────
    resize();
    window.addEventListener('resize', resize);
    requestAnimationFrame(animate);
  </script>
</body>

</html>
