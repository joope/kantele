<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Kantele</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header id="header">
      <h1>Kantele</h1>
      <div id="controls">
        <div class="control-group">
          <label for="tuning-select">Tuning</label>
          <select id="tuning-select"></select>
        </div>
        <div class="control-group">
          <label for="string-count">Strings</label>
          <select id="string-count">
            <option value="5">5</option>
            <option value="10">10</option>
            <option value="15" selected>15</option>
            <option value="21">21</option>
          </select>
        </div>
        <div class="control-group">
          <label for="reverb-slider">Reverb</label>
          <input type="range" id="reverb-slider" min="0" max="100" value="40">
        </div>
        <button id="mute-btn" title="Mute all strings">Mute</button>
        <button id="labels-btn" title="Toggle note labels">Notes</button>
        <button id="sound-btn" title="Sound settings">Sound</button>
      </div>
    </header>
    <div id="sound-panel" class="sound-panel hidden">
      <div class="sound-sliders">
        <div class="slider-row">
          <label>Brightness</label>
          <input type="range" data-param="brightness" min="0" max="100" value="75">
          <span class="slider-val">75</span>
        </div>
        <div class="slider-row">
          <label>Attack softness</label>
          <input type="range" data-param="attackSoftness" min="0" max="100" value="30">
          <span class="slider-val">30</span>
        </div>
        <div class="slider-row">
          <label>Sustain</label>
          <input type="range" data-param="decay" min="0" max="100" value="80">
          <span class="slider-val">80</span>
        </div>
        <div class="slider-row">
          <label>Damping</label>
          <input type="range" data-param="damping" min="0" max="100" value="40">
          <span class="slider-val">40</span>
        </div>
        <div class="slider-row">
          <label>Body</label>
          <input type="range" data-param="body" min="0" max="100" value="30">
          <span class="slider-val">30</span>
        </div>
        <div class="slider-row">
          <label>Presence</label>
          <input type="range" data-param="presence" min="0" max="100" value="42">
          <span class="slider-val">42</span>
        </div>
        <div class="slider-row">
          <label>High shelf</label>
          <input type="range" data-param="highShelf" min="0" max="100" value="56">
          <span class="slider-val">56</span>
        </div>
        <div class="slider-row">
          <label>LP cutoff</label>
          <input type="range" data-param="lpCutoff" min="0" max="100" value="43">
          <span class="slider-val">43</span>
        </div>
      </div>
    </div>
    <div id="canvas-container">
      <canvas id="kantele-canvas"></canvas>
      <div id="audio-prompt" class="overlay">Tap anywhere to begin</div>
    </div>
  </div>
  <script type="module" src="main.js"></script>
</body>
</html>
