  <script>
    // ─── Analytics Helper ────────────────────────────────────────
    function trackEvent(action, category, label, value) {
      if (typeof gtag === 'function') {
        const params = { event_category: category };
        if (label !== undefined) params.event_label = label;
        if (value !== undefined) params.value = value;
        gtag('event', action, params);
      }
    }

    // ─── Audio Engine ──────────────────────────────────────────────
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null;

    // ─── Sample Files ──────────────────────────────────────────────
    const SAMPLE_FILES = ['D.mp3', 'E_2.mp3', 'F%23_3.mp3', 'G_4.mp3', 'A_5.mp3'];
    const sampleBuffers = [null, null, null, null, null];
    const sampleRawData = [null, null, null, null, null];
    // Debounced save for tuning
    let _saveTuningTimer = null;
    function debouncedSaveTuning() {
      if (_saveTuningTimer) clearTimeout(_saveTuningTimer);
      _saveTuningTimer = setTimeout(saveTuning, 300);
    }

    // Prefetch raw audio data immediately (no AudioContext needed)
    const fetchPromise = Promise.all(SAMPLE_FILES.map(async (file, i) => {
      const resp = await fetch(file);
      sampleRawData[i] = await resp.arrayBuffer();
    }));

    let decodePromise = null;

    function decodeSamples() {
      if (decodePromise) return decodePromise;
      decodePromise = (async () => {
        await fetchPromise;
        await Promise.all(sampleRawData.map(async (raw, i) => {
          // decodeAudioData transfers the ArrayBuffer, so pass a copy
          if (raw) sampleBuffers[i] = await audioCtx.decodeAudioData(raw.slice(0));
        }));
      })();
      return decodePromise;
    }

    // Try to create context and decode eagerly (works on desktop;
    // on iOS the context will be suspended but decoding still works)
    try {
      audioCtx = new AudioCtx();
      fetchPromise.then(() => decodeSamples());
    } catch (e) { }

    function ensureAudio() {
      // After phone lock/unlock, iOS sets state to 'interrupted' or 'closed'
      // and the context cannot be resumed — must create a fresh one
      if (audioCtx && (audioCtx.state === 'closed' || audioCtx.state === 'interrupted')) {
        audioCtx = null;
        decodePromise = null;
      }
      if (!audioCtx) {
        audioCtx = new AudioCtx();
        decodeSamples();
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }

    // Re-activate audio when returning from lock screen / background tab
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible' && audioCtx) {
        if (audioCtx.state === 'suspended') {
          audioCtx.resume();
        } else if (audioCtx.state === 'interrupted' || audioCtx.state === 'closed') {
          audioCtx = null;
          decodePromise = null;
        }
      }
    });

    // ─── Tuning ──────────────────────────────────────────────────
    const STRING_NAMES = ['D', 'E', 'F♯', 'G', 'A'];
    const BASE_SEMITONES = [0, 0, 0, 0, 0]; // semitone offset per string
    let tuning = [...BASE_SEMITONES];

    function loadTuning() {
      try {
        const saved = JSON.parse(localStorage.getItem('kantele-tuning'));
        if (Array.isArray(saved) && saved.length === 5) tuning = saved;
      } catch (e) { }
    }
    function saveTuning() {
      localStorage.setItem('kantele-tuning', JSON.stringify(tuning));
    }
    function semitonesToRate(semitones) {
      return Math.pow(2, semitones / 12);
    }

    loadTuning();

    // ─── State ─────────────────────────────────────────────────────
    let activeVoices = [null, null, null, null, null];
    let stringVibration = [0, 0, 0, 0, 0];
    let stringMuteCount = [0, 0, 0, 0, 0];
    let muteVisual = [0, 0, 0, 0, 0];
    let mutePos = [0.5, 0.5, 0.5, 0.5, 0.5]; // where along the string (0..1) the finger is
    let isMobile = matchMedia('(pointer: coarse)').matches;

    // ─── Kantele Image ────────────────────────────────────────────
    const kanteleImg = new Image();
    kanteleImg.src = 'kantele_v6.png';
    let imgLoaded = false;
    kanteleImg.onload = () => { imgLoaded = true; computeLayout(); requestRedraw(); };

    // ─── Background Texture ──────────────────────────────────────
    const bgImg = new Image();
    bgImg.src = 'texture_2.png';
    let bgLoaded = false;
    bgImg.onload = () => { bgLoaded = true; requestRedraw(); };

    // ─── Instrument Transform ─────────────────────────────────────
    // scale: 1 = fit to screen width, offsetX/Y: fraction of screen, rotation: degrees
    const instrumentTransform = { scale: 0.93, offsetX: -0.016, offsetY: 0.024, rotation: 9.5 };

    // ─── String Positions (image-relative fractions) ──────────────
    const stringPositions = {
      bridge: [
        { x: 0.8513403458530613, y: 0.33381062469688166 },
        { x: 0.8515232325304376, y: 0.37786960741767495 },
        { x: 0.8518617218279767, y: 0.42043604505498755 },
        { x: 0.852747625121056, y: 0.46353873947683394 },
        { x: 0.8530362800378654, y: 0.5049609612280171 },
      ],
      peg: [
        { x: 0.13422591771617554, y: 0.3399992679423589 },
        { x: 0.18468874741656627, y: 0.42227353322205957 },
        { x: 0.2346947171896111, y: 0.49050903028759824 },
        { x: 0.28439220718786995, y: 0.5621370121095425 },
        { x: 0.33541516684293154, y: 0.6376961694811449 },
      ],
    };

    // ─── Debug Mode ────────────────────────────────────────────────
    const debugMode = new URLSearchParams(location.search).has('debug');
    let debugDrag = null; // { type: 'bridge'|'peg', index: number }

    function drawDebugPoints() {
      const b = computeLayout.body;
      if (!b) return;
      const { imgW, imgH, imgX, imgY } = b;
      const r = 8;

      for (const type of ['bridge', 'peg']) {
        const color = type === 'bridge' ? '#ff3333' : '#33ff33';
        stringPositions[type].forEach((p, i) => {
          const pt = imgToCanvas(p.x, p.y, imgW, imgH, imgX, imgY);
          ctx.beginPath();
          ctx.arc(pt.x, pt.y, r, 0, Math.PI * 2);
          ctx.fillStyle = color;
          ctx.globalAlpha = 0.8;
          ctx.fill();
          ctx.globalAlpha = 1;
          ctx.strokeStyle = '#fff';
          ctx.lineWidth = 2;
          ctx.stroke();
          ctx.fillStyle = '#fff';
          ctx.font = '12px monospace';
          ctx.fillText(`${type[0].toUpperCase()}${i}`, pt.x + 12, pt.y + 4);
        });
      }
    }

    function debugHitTest(mx, my) {
      const b = computeLayout.body;
      if (!b) return null;
      const { imgW, imgH, imgX, imgY } = b;
      const hitR = 15;
      for (const type of ['bridge', 'peg']) {
        for (let i = 0; i < stringPositions[type].length; i++) {
          const p = stringPositions[type][i];
          const pt = imgToCanvas(p.x, p.y, imgW, imgH, imgX, imgY);
          if (Math.hypot(mx - pt.x, my - pt.y) < hitR) {
            return { type, index: i };
          }
        }
      }
      return null;
    }

    function debugCopyPositions() {
      const json = JSON.stringify(stringPositions, null, 2);
      navigator.clipboard.writeText(json).then(() => {
        debugStatus.textContent = 'Copied!';
        setTimeout(() => { debugStatus.textContent = ''; }, 1500);
      });
    }

    function debugSavePositions() {
      // Update the stringPositions in-place (already done via drag),
      // just copy the code-ready output
      let code = 'const stringPositions = {\n  bridge: [\n';
      stringPositions.bridge.forEach((p, i) => {
        code += `    { x: ${p.x}, y: ${p.y} },\n`;
      });
      code += '  ],\n  peg: [\n';
      stringPositions.peg.forEach((p, i) => {
        code += `    { x: ${p.x}, y: ${p.y} },\n`;
      });
      code += '  ],\n};';
      navigator.clipboard.writeText(code).then(() => {
        debugStatus.textContent = 'Code copied!';
        setTimeout(() => { debugStatus.textContent = ''; }, 1500);
      });
    }

    // Debug UI — initialized later after canvas/vars are ready
    let debugStatus;

    // ─── Synthesis ─────────────────────────────────────────────────
    let _firstMute = true;
    function muteString(idx, pos) {
      if (stringMuteCount[idx] === 0) {
        recEvent(1, idx);
        stopString(idx);
        if (_firstMute) { trackEvent('first_mute', 'instrument', STRING_NAMES[idx]); _firstMute = false; }
      }
      stringMuteCount[idx]++;
      if (pos !== undefined) mutePos[idx] = pos;
      requestRedraw();
    }

    function unmuteString(idx) {
      if (stringMuteCount[idx] === 1) recEvent(2, idx);
      stringMuteCount[idx] = Math.max(0, stringMuteCount[idx] - 1);
      requestRedraw();
    }

    function isStringMuted(idx) {
      return stringMuteCount[idx] > 0;
    }

    let _firstPluck = true;
    function pluckString(stringIndex, velocity = 0.7) {
      if (isStringMuted(stringIndex)) return;
      if (!sampleBuffers[stringIndex]) return;
      recEvent(0, stringIndex, velocity);
      if (_firstPluck) { trackEvent('first_pluck', 'instrument', STRING_NAMES[stringIndex]); _firstPluck = false; }
      const ctx = ensureAudio();

      stopString(stringIndex);

      const source = ctx.createBufferSource();
      source.buffer = sampleBuffers[stringIndex];
      source.playbackRate.value = semitonesToRate(tuning[stringIndex]);

      const gainNode = ctx.createGain();
      gainNode.gain.value = velocity;

      source.connect(gainNode);
      gainNode.connect(ctx.destination);
      source.start();

      activeVoices[stringIndex] = { gain: gainNode, source, time: ctx.currentTime };
      triggerVibration(stringIndex, velocity);
    }

    function stopString(idx) {
      if (activeVoices[idx]) {
        try {
          const now = audioCtx.currentTime;
          activeVoices[idx].gain.gain.setValueAtTime(activeVoices[idx].gain.gain.value, now);
          activeVoices[idx].gain.gain.linearRampToValueAtTime(0, now + 0.05);
          activeVoices[idx].source.stop(now + 0.06);
        } catch (e) { }
        activeVoices[idx] = null;
      }
      stringVibration[idx] = 0;
    }

    function stopAll() {
      for (let i = 0; i < 5; i++) stopString(i);
    }

    function triggerVibration(idx, amplitude) {
      stringVibration[idx] = Math.max(stringVibration[idx], amplitude);
      requestRedraw();
    }

    // ─── Canvas ────────────────────────────────────────────────────
    const canvas = document.getElementById('kantele');
    const ctx = canvas.getContext('2d');
    let W, H, dpr = window.devicePixelRatio || 1;
    let stringEndpoints = [];
    let stringHitAreas = [];
    let tuneKnobPositions = [];
    let mobilePortrait = false;

    function resize() {
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      isMobile = matchMedia('(pointer: coarse)').matches;
      mobilePortrait = isMobile && vh > vw;
      instrumentTransform.rotation = mobilePortrait ? 4.5 : 9.5;
      if (!mobilePortrait) instrumentTransform.scale = 0.98;

      if (mobilePortrait) {
        // Swap dimensions — canvas renders in landscape, CSS rotates it
        W = vh;
        H = vw;
        canvas.width = W * dpr;
        canvas.height = H * dpr;
        canvas.style.width = W + 'px';
        canvas.style.height = H + 'px';
        canvas.style.transform = 'rotate(90deg)';
        canvas.style.transformOrigin = 'top left';
        canvas.style.position = 'fixed';
        canvas.style.top = '0px';
        canvas.style.left = vw + 'px';
      } else {
        W = vw;
        H = vh;
        canvas.width = W * dpr;
        canvas.height = H * dpr;
        canvas.style.width = W + 'px';
        canvas.style.height = H + 'px';
        canvas.style.transform = '';
        canvas.style.transformOrigin = '';
        canvas.style.position = '';
        canvas.style.top = '';
        canvas.style.left = '';
      }

      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      computeLayout();
      requestRedraw();
    }

    // Transform a point from image-relative coords to canvas coords
    function imgToCanvas(fx, fy, imgW, imgH, imgX, imgY) {
      // Point relative to image center
      const lx = (fx - 0.5) * imgW;
      const ly = (fy - 0.5) * imgH;
      // Rotate
      const rad = instrumentTransform.rotation * Math.PI / 180;
      const cos = Math.cos(rad), sin = Math.sin(rad);
      const rx = lx * cos - ly * sin;
      const ry = lx * sin + ly * cos;
      // Translate to canvas
      const cx = imgX + imgW / 2 + rx;
      const cy = imgY + imgH / 2 + ry;
      return { x: cx, y: cy };
    }

    function computeLayout() {
      if (!imgLoaded) return;
      const imgAspect = kanteleImg.naturalWidth / kanteleImg.naturalHeight;
      const t = instrumentTransform;

      // Fit to screen width, then apply scale
      let imgW = W * t.scale;
      let imgH = imgW / imgAspect;

      // Center + offset
      const imgX = (W - imgW) / 2 + t.offsetX * W;
      const imgY = (H - imgH) / 2 + t.offsetY * H;

      const pos = stringPositions;
      stringEndpoints = [];
      stringHitAreas = [];

      for (let i = 0; i < 5; i++) {
        const p1 = imgToCanvas(pos.bridge[i].x, pos.bridge[i].y, imgW, imgH, imgX, imgY);
        const p2 = imgToCanvas(pos.peg[i].x, pos.peg[i].y, imgW, imgH, imgX, imgY);

        stringEndpoints.push({ x1: p1.x, y1: p1.y, x2: p2.x, y2: p2.y });

        const gap = imgH * 0.06;
        const hitR = isMobile ? Math.max(gap * 1.2, 28) : Math.max(gap * 0.7, 16);
        stringHitAreas.push({ x1: p1.x, y1: p1.y, x2: p2.x, y2: p2.y, hitRadius: hitR });
      }

      tuneKnobPositions = [];
      for (let i = 0; i < 5; i++) {
        const p = imgToCanvas(pos.peg[i].x, pos.peg[i].y, imgW, imgH, imgX, imgY);
        tuneKnobPositions.push(p);
      }

      computeLayout.body = { imgW, imgH, imgX, imgY };
    }

    function drawBody() {
      const b = computeLayout.body;
      if (!b || !imgLoaded) return;
      const { imgW, imgH, imgX, imgY } = b;
      const rad = instrumentTransform.rotation * Math.PI / 180;
      const cx = imgX + imgW / 2;
      const cy = imgY + imgH / 2;

      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(rad);
      // Draw a soft shadow beneath the kantele
      ctx.shadowColor = 'rgba(0,0,0,0.7)';
      ctx.shadowBlur = 40;
      ctx.shadowOffsetY = 100;
      ctx.shadowOffsetX = 40;
      ctx.drawImage(kanteleImg, -imgW / 2, -imgH / 2, imgW, imgH);
      ctx.restore();
    }

    // Pre-allocated point arrays to avoid GC pressure in render loop
    const _isMobileInit = matchMedia('(pointer: coarse)').matches;
    const STRING_STEPS = _isMobileInit ? 30 : 60;
    const _pathPoints = Array.from({ length: 5 }, () =>
      Array.from({ length: STRING_STEPS + 1 }, () => ({ x: 0, y: 0 }))
    );
    const _shadowPoints = Array.from({ length: STRING_STEPS + 1 }, () => ({ x: 0, y: 0 }));
    const _offsetPoints = Array.from({ length: STRING_STEPS + 1 }, () => ({ x: 0, y: 0 }));

    // Pre-computed shadow color strings
    const _shadowColors = [0, 1, 2, 3].map(s => `rgba(90,60,5,${0.06 - s * 0.03})`);

    function computeStringPath(out, ep, dx, dy, nx, ny, vib, time, i, scale) {
      for (let s = 0; s <= STRING_STEPS; s++) {
        const t = s / STRING_STEPS;
        const envelope = Math.sin(t * Math.PI);
        const displacement = vib > 0.001
          ? vib * envelope * (envelope * Math.sin(time * 25 + i) + Math.sin(t * Math.PI * 2) * Math.sin(time * 38 + i) * 0.3) * 8 * scale
          : 0;
        out[s].x = ep.x1 + dx * t + nx * displacement;
        out[s].y = ep.y1 + dy * t + ny * displacement;
      }
    }

    function tracePath(points, count) {
      const n = count || points.length;
      ctx.beginPath();
      ctx.moveTo(points[0].x, points[0].y);
      for (let s = 1; s < n; s++) ctx.lineTo(points[s].x, points[s].y);
    }

    function tracePathOffset(points, count, offX, offY) {
      const n = count || points.length;
      ctx.beginPath();
      ctx.moveTo(points[0].x + offX, points[0].y + offY);
      for (let s = 1; s < n; s++) ctx.lineTo(points[s].x + offX, points[s].y + offY);
    }

    function drawStrings(time) {
      if (stringEndpoints.length < 5) return;
      const nPts = STRING_STEPS + 1;
      const b = computeLayout.body;
      const sizeScale = b ? b.imgW / 1000 : 1;

      for (let i = 0; i < 5; i++) {
        const ep = stringEndpoints[i];
        const vib = stringVibration[i];
        const mute = muteVisual[i];
        const thickness = (0.4 + (4 - i) * 0.28) * sizeScale;

        ctx.save();

        const dx = ep.x2 - ep.x1;
        const dy = ep.y2 - ep.y1;
        const len = Math.hypot(dx, dy);
        const nx = -dy / len;
        const ny = dx / len;

        const points = _pathPoints[i];
        computeStringPath(points, ep, dx, dy, nx, ny, vib, time, i, sizeScale);

        // Shadow underneath the string (fewer passes on mobile)
        const shadowDx = nx * 2 * sizeScale - 10;
        const shadowDy = ny * 2 * sizeScale + 30 * sizeScale;
        const shadowStart = isMobile ? 1 : 3;
        for (let s = shadowStart; s >= 0; s--) {
          const spread = s * 3.0 * sizeScale;
          tracePathOffset(points, nPts, shadowDx, shadowDy);
          ctx.strokeStyle = _shadowColors[s];
          ctx.lineWidth = thickness + 2 * sizeScale + spread * 2;
          ctx.lineCap = 'round';
          ctx.stroke();
        }

        // Dark base layer
        tracePath(points, nPts);
        ctx.strokeStyle = '#555';
        ctx.lineWidth = thickness;
        ctx.lineCap = 'round';
        ctx.stroke();

        // Main metallic body — offset line
        const metalOffX = nx * thickness * 0.15;
        const metalOffY = ny * thickness * 0.15;
        tracePathOffset(points, nPts, metalOffX, metalOffY);
        ctx.strokeStyle = '#aaa';
        ctx.lineWidth = thickness * 0.7;
        ctx.stroke();

        // Bright specular highlight
        const specOffX = nx * thickness * 0.3;
        const specOffY = ny * thickness * 0.3;
        tracePathOffset(points, nPts, specOffX, specOffY);
        ctx.strokeStyle = 'rgba(255,255,255,0.6)';
        ctx.lineWidth = thickness * 0.25;
        ctx.stroke();

        // Vibration glow (fewer passes on mobile)
        if (vib > 0.05) {
          const glowRadius = vib * 6 * sizeScale;
          const glowColor = `rgba(200,210,220,${(vib * 0.1).toFixed(3)})`;
          const glowStart = isMobile ? 1 : 3;
          for (let g = glowStart; g >= 0; g--) {
            const spread = g * glowRadius * 0.5;
            tracePath(points, nPts);
            ctx.strokeStyle = glowColor;
            ctx.lineWidth = thickness + vib * 12 * sizeScale + spread * 2;
            ctx.lineCap = 'round';
            ctx.stroke();
          }
        }

        // Fingertip on muted string
        if (mute > 0.3) {
          const ft = mutePos[i];
          const fx = ep.x1 + dx * ft;
          const fy = ep.y1 + dy * ft;
          const fingerR = isMobile ? 14 * sizeScale : (8 + (thickness - 1) * 2) * sizeScale;
          ctx.beginPath();
          ctx.arc(fx, fy, fingerR * mute, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(180,140,110,${(mute * 0.5).toFixed(3)})`;
          ctx.fill();
          ctx.beginPath();
          ctx.arc(fx, fy, fingerR * mute * 0.6, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(80,50,30,${(mute * 0.3).toFixed(3)})`;
          ctx.fill();
        }

        ctx.restore();
      }
    }

    // ─── Tuning Knobs (on-canvas) ─────────────────────────────────
    const TUNE_KNOB_BASE_RADIUS = 13;
    let tuneKnobDrag = -1; // index of knob being dragged, -1 = none
    let tuneKnobDragTouchId = null; // touch identifier for knob drag

    function tuneKnobRadius() {
      const b = computeLayout.body;
      // Scale relative to image width on screen (base assumes ~1000px wide)
      return b ? TUNE_KNOB_BASE_RADIUS * (b.imgW / 1000) : TUNE_KNOB_BASE_RADIUS;
    }

    function drawTuneKnobs() {
      if (tuneKnobPositions.length < 5) return;
      for (let i = 0; i < 5; i++) {
        const kp = tuneKnobPositions[i];
        const r = tuneKnobRadius();
        const active = tuneKnobDrag === i;

        // Pin shadow — elevated ~2-3cm so shadow is offset and widens downward
        const shadowOffX = r * 0.0;
        const shadowOffY = r * 1;
        const shadowR = r * 0.4;
        ctx.save();
        ctx.translate(kp.x + shadowOffX, kp.y + shadowOffY);
        ctx.scale(1, 6); // elongate vertically to simulate perspective
        const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, shadowR);
        grad.addColorStop(0, 'rgba(0,0,0,0.35)');
        grad.addColorStop(0.5, 'rgba(0,0,0,0.15)');
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.beginPath();
        ctx.arc(0, 0, shadowR, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();
        ctx.restore();

        // Solid knob
        ctx.beginPath();
        ctx.arc(kp.x, kp.y, r, 0, Math.PI * 2);
        ctx.fillStyle = active ? '#5a4a3a' : '#3d3028';
        ctx.fill();
        ctx.strokeStyle = '#6b5a48';
        ctx.lineWidth = 1.5;
        ctx.stroke();

        // Indicator line — points in direction matching the tuning value
        const baseAngle = -Math.PI / 2;
        const angle = baseAngle + tuning[i] * (Math.PI / 12);
        const ix = kp.x + Math.cos(angle) * r * 0.65;
        const iy = kp.y + Math.sin(angle) * r * 0.65;
        ctx.beginPath();
        ctx.moveTo(kp.x, kp.y);
        ctx.lineTo(ix, iy);
        ctx.strokeStyle = '#a08868';
        ctx.lineWidth = 2.5;
        ctx.lineCap = 'round';
        ctx.stroke();
      }
    }

    function hitTestTuneKnob(x, y) {
      if (tuneKnobPositions.length < 5) return -1;
      const r = tuneKnobRadius();
      const hitR = isMobile ? r * 2.5 : r * 1.8;
      for (let i = 0; i < 5; i++) {
        const kp = tuneKnobPositions[i];
        if (Math.hypot(x - kp.x, y - kp.y) <= hitR) return i;
      }
      return -1;
    }

    function updatePlaybackRate(idx) {
      if (activeVoices[idx]) {
        activeVoices[idx].source.playbackRate.value = semitonesToRate(tuning[idx]);
      }
    }

    let tuneKnobLastTap = 0; // timestamp of last knob tap
    let tuneKnobLastTapIdx = -1; // which knob was last tapped
    let _firstTune = true;
    function applyTuneKnobDrag(x, y) {
      if (recording) { tuneKnobDrag = -1; return; }
      if (tuneKnobDrag < 0 || tuneKnobPositions.length < 5) return;
      const kp = tuneKnobPositions[tuneKnobDrag];
      const dx = x - kp.x;
      const dy = y - kp.y;
      // Ignore if pointer is too close to knob center (avoid jitter)
      if (Math.hypot(dx, dy) < 5) return;
      // Compute angle from knob center to pointer
      const angle = Math.atan2(dy, dx);
      const baseAngle = -Math.PI / 2;
      // Convert angle to semitones: tuning = (angle - baseAngle) / (PI/12)
      let diff = angle - baseAngle;
      // Normalize to [-PI, PI]
      while (diff > Math.PI) diff -= 2 * Math.PI;
      while (diff < -Math.PI) diff += 2 * Math.PI;
      const semitones = Math.max(-12, Math.min(12, diff / (Math.PI / 12)));
      tuning[tuneKnobDrag] = semitones;
      updatePlaybackRate(tuneKnobDrag);
      if (_firstTune) { trackEvent('first_tune', 'instrument', STRING_NAMES[tuneKnobDrag]); _firstTune = false; }
      debouncedSaveTuning();
      requestRedraw();
    }

    function resetTuneKnob(idx) {
      if (recording) return;
      trackEvent('tune_reset', 'instrument', STRING_NAMES[idx]);
      tuning[idx] = 0;
      updatePlaybackRate(idx);
      debouncedSaveTuning();
      requestRedraw();
    }

    // ─── Animation Loop ────────────────────────────────────────────
    let lastTime = 0;
    let needsRedraw = true; // flag to request a redraw from outside the loop
    const LOG_03 = Math.log(0.3) / 4; // pre-computed for vibration decay (slowed 4x)

    function requestRedraw() { needsRedraw = true; }

    function isAnimating() {
      for (let i = 0; i < 5; i++) {
        if (stringVibration[i] > 0) return true;
        if (Math.abs(muteVisual[i] - (isStringMuted(i) ? 1 : 0)) > 0.01) return true;
      }
      return false;
    }

    function animate(timestamp) {
      const time = timestamp / 1000;
      const dt = time - lastTime;
      lastTime = time;

      const animating = isAnimating();

      if (animating || needsRedraw) {
        needsRedraw = false;

        ctx.save();
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.clearRect(0, 0, W, H);
        if (bgLoaded) {
          ctx.drawImage(bgImg, 0, 0, W, H);
        }
        drawBody();
        drawStrings(time);
        drawTuneKnobs();
        if (debugMode) drawDebugPoints();
        ctx.restore();
      }

      for (let i = 0; i < 5; i++) {
        if (stringVibration[i] > 0) {
          stringVibration[i] *= Math.exp(LOG_03 * dt);
          if (stringVibration[i] < 0.005) stringVibration[i] = 0;
        }
        const target = isStringMuted(i) ? 1 : 0;
        muteVisual[i] += (target - muteVisual[i]) * Math.min(1, dt * 12);
      }

      requestAnimationFrame(animate);
    }

    function screenToCanvas(sx, sy) {
      return { x: sx, y: sy };
    }

    // ─── Hit Testing ───────────────────────────────────────────────
    function pointToLineDistance(px, py, x1, y1, x2, y2) {
      const dx = x2 - x1;
      const dy = y2 - y1;
      const lenSq = dx * dx + dy * dy;
      let t = ((px - x1) * dx + (py - y1) * dy) / lenSq;
      t = Math.max(0, Math.min(1, t));
      const nearX = x1 + t * dx;
      const nearY = y1 + t * dy;
      return Math.hypot(px - nearX, py - nearY);
    }

    function hitTestString(x, y, radiusScale = 1) {
      let best = -1;
      let bestDist = Infinity;
      for (let i = 0; i < 5; i++) {
        const ha = stringHitAreas[i];
        const d = pointToLineDistance(x, y, ha.x1, ha.y1, ha.x2, ha.y2);
        if (d < ha.hitRadius * radiusScale && d < bestDist) {
          bestDist = d;
          best = i;
        }
      }
      return best;
    }

    // Test if line segment (ax,ay)→(bx,by) crosses segment (cx,cy)→(dx,dy)
    function segmentsCross(ax, ay, bx, by, cx, cy, dx, dy) {
      const d1 = (bx - ax) * (cy - ay) - (by - ay) * (cx - ax);
      const d2 = (bx - ax) * (dy - ay) - (by - ay) * (dx - ax);
      if (d1 * d2 >= 0) return false; // same side
      const d3 = (dx - cx) * (ay - cy) - (dy - cy) * (ax - cx);
      const d4 = (dx - cx) * (by - cy) - (dy - cy) * (bx - cx);
      if (d3 * d4 >= 0) return false; // same side
      return true;
    }

    // Check which strings the movement from (ox,oy)→(nx,ny) crosses
    function strumCrossTest(ox, oy, nx, ny) {
      const crossed = [];
      for (let i = 0; i < 5; i++) {
        const ep = stringEndpoints[i];
        if (segmentsCross(ox, oy, nx, ny, ep.x1, ep.y1, ep.x2, ep.y2)) {
          crossed.push(i);
        }
      }
      return crossed;
    }

    // Position along string (0..1) closest to point
    function stringParamAt(stringIdx, x, y) {
      const ep = stringEndpoints[stringIdx];
      const dx = ep.x2 - ep.x1;
      const dy = ep.y2 - ep.y1;
      const lenSq = dx * dx + dy * dy;
      let t = ((x - ep.x1) * dx + (y - ep.y1) * dy) / lenSq;
      return Math.max(0, Math.min(1, t));
    }

    // ─── Touch Input ───────────────────────────────────────────────
    // Every finger on a string mutes it (like resting your finger on it).
    // Sound only happens when a finger MOVES across a string — the crossing
    // motion is the pluck. Lift finger = unmute that string.
    // This mirrors real kantele: left hand holds fingers still on strings
    // to dampen them, right hand sweeps across to sound the free ones.

    const activeTouches = new Map();

    function getScreenTouchPos(touch) {
      if (mobilePortrait) {
        // Canvas is rotated 90deg CW: remap screen coords to canvas coords
        return { x: touch.clientY, y: H - touch.clientX };
      }
      const rect = canvas.getBoundingClientRect();
      return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
    }

    function getTouchPos(touch) {
      const screen = getScreenTouchPos(touch);
      return screenToCanvas(screen.x, screen.y);
    }

    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      ensureAudio();

      // Register new touches and check what they hit
      for (const touch of e.changedTouches) {
        const pos = getTouchPos(touch);
        const info = {
          lastX: pos.x, lastY: pos.y,
          startX: pos.x, startY: pos.y,
          mutedString: -1,
          lastPlucked: -1,
        };
        // Check tuning knobs first (disabled during recording), then strings
        const knobHit = recording ? -1 : hitTestTuneKnob(pos.x, pos.y);
        if (knobHit >= 0) {
          const now = performance.now();
          if (knobHit === tuneKnobLastTapIdx && now - tuneKnobLastTap < 400) {
            resetTuneKnob(knobHit);
            tuneKnobLastTap = 0;
            tuneKnobLastTapIdx = -1;
            info.tuningKnob = true;
          } else {
            tuneKnobLastTap = now;
            tuneKnobLastTapIdx = knobHit;
            tuneKnobDrag = knobHit;
            tuneKnobDragTouchId = touch.identifier;
            info.tuningKnob = true;
          }
        } else {
          const hit = hitTestString(pos.x, pos.y);
          if (hit >= 0) {
            info.hitString = hit;
            info.touchTime = performance.now();
          }
        }
        activeTouches.set(touch.identifier, info);
      }

      // Start mute timers for fingers on strings
      for (const touch of e.changedTouches) {
        const info = activeTouches.get(touch.identifier);
        if (!info || info.tuningKnob || info.hitString < 0) continue;
        const id = touch.identifier;
        info.muteTimer = setTimeout(() => {
          const i = activeTouches.get(id);
          if (i && i.hitString >= 0 && i.mutedString < 0) {
            i.mutedString = i.hitString;
            muteString(i.hitString, stringParamAt(i.hitString, i.lastX, i.lastY));
          }
        }, 100);
      }
    }, { passive: false });

    canvas.addEventListener('touchmove', (e) => {
      e.preventDefault();

      for (const touch of e.changedTouches) {
        const info = activeTouches.get(touch.identifier);
        if (!info) continue;
        const pos = getTouchPos(touch);

        // Handle tuning knob drag
        if (info.tuningKnob && tuneKnobDrag >= 0 && touch.identifier === tuneKnobDragTouchId) {
          applyTuneKnobDrag(pos.x, pos.y);
          continue;
        }

        // Strum: check if finger path crossed any string lines
        const crossed = strumCrossTest(info.lastX, info.lastY, pos.x, pos.y);

        // Only unmute when the finger actually crosses another string
        let justUnmuted = -1;
        if (info.mutedString >= 0 && crossed.length > 0) {
          const crossedOther = crossed.some(si => si !== info.mutedString);
          if (crossedOther) {
            justUnmuted = info.mutedString;
            unmuteString(info.mutedString);
            info.mutedString = -1;
            info.hitString = -1;
          }
        }

        for (const si of crossed) {
          // Skip the string currently muted by this finger
          if (si === info.mutedString) continue;
          // Skip the string that was just unmuted in this same move event
          if (si === justUnmuted) continue;
          if (!isStringMuted(si)) {
            pluckString(si, 0.4 + Math.random() * 0.2);
          }
          // If the initial hit string was strummed, cancel the pending mute
          if (si === info.hitString && info.muteTimer) {
            clearTimeout(info.muteTimer);
            info.muteTimer = null;
            info.hitString = -1;
          }

        info.lastX = pos.x;
        info.lastY = pos.y;
      }
    }, { passive: false });

    canvas.addEventListener('touchend', (e) => {
      e.preventDefault();

        if (!info) { activeTouches.delete(touch.identifier); continue; }

    // ─── Mouse Input ───────────────────────────────────────────────
    // Quick click = pluck. Hold = mute. Drag across = pluck crossed strings.
    let mouseDown = false;
    let mouseMutedString = -1;
    let mouseHitString = -1;

    let mouseLastPlucked = -1;
    let mouseStartX = 0, mouseStartY = 0;
    let mouseLastX = 0, mouseLastY = 0;

    function getMousePos(e) {

    canvas.addEventListener('mousedown', (e) => {

      mouseStartX = pos.x; mouseStartY = pos.y;

    canvas.addEventListener('dblclick', (e) => {

    // ─── Keyboard Input ────────────────────────────────────────────
    const MUTE_KEYS = ['q', 'w', 'e', 'r', 't'];

    // ─── Localization ────────────────────────────────────────────

    // ─── Recording & Sharing ────────────────────────────────────
    const MAX_RECORDING_MS = 20000;
    let recording = false;
    let recStart = 0;
    let recEvents = []; // {t, a: 0=pluck|1=mute|2=unmute, s: 0-4, v?: 0-7}

    function recEvent(action, stringIdx, velocity) {
      if (!recording) return;
      const t = performance.now() - recStart;
      if (t > MAX_RECORDING_MS) { stopRecording(); return; }
      const ev = { t: Math.round(t), a: action, s: stringIdx };
      if (action === 0) ev.v = Math.round(Math.min(7, Math.max(0, (velocity - 0.3) / 0.1)));
      recEvents.push(ev);
    }

    // Bitstream helpers
    function BitWriter() {
      this.bytes = []; this.byte = 0; this.bit = 0;
    }
    BitWriter.prototype.write = function (val, n) {
      for (let i = n - 1; i >= 0; i--) {
        this.byte = (this.byte << 1) | ((val >> i) & 1);
        this.bit++;
        if (this.bit === 8) { this.bytes.push(this.byte); this.byte = 0; this.bit = 0; }
      }
    };
    BitWriter.prototype.finish = function () {
      if (this.bit > 0) { this.byte <<= (8 - this.bit); this.bytes.push(this.byte); }
      return new Uint8Array(this.bytes);
    };

    function BitReader(buf) {
      this.buf = buf; this.pos = 0; this.bit = 0;
    }
    BitReader.prototype.read = function (n) {
      let val = 0;
      for (let i = 0; i < n; i++) {
        if (this.pos >= this.buf.length) return -1;
        val = (val << 1) | ((this.buf[this.pos] >> (7 - this.bit)) & 1);
        this.bit++;
        if (this.bit === 8) { this.bit = 0; this.pos++; }
      }
      return val;
    };
    BitReader.prototype.hasMore = function (n) {
      return (this.pos * 8 + this.bit + n) <= this.buf.length * 8;
    };

    const B64 = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-_';
    const B64_REV = {};
    for (let i = 0; i < 64; i++) B64_REV[B64[i]] = i;

    function toBase64Url(buf) {
      let s = '';
      for (let i = 0; i < buf.length; i += 3) {
        const b0 = buf[i], b1 = i + 1 < buf.length ? buf[i + 1] : 0, b2 = i + 2 < buf.length ? buf[i + 2] : 0;
        s += B64[(b0 >> 2)];
        s += B64[((b0 & 3) << 4) | (b1 >> 4)];
        if (i + 1 < buf.length) s += B64[((b1 & 15) << 2) | (b2 >> 6)];
        if (i + 2 < buf.length) s += B64[b2 & 63];
      }
      return s;
    }

    function fromBase64Url(s) {
      const out = [];
      let i = 0;
      while (i < s.length) {
        const a = B64_REV[s[i++]] || 0;
        const b = i < s.length ? (B64_REV[s[i++]] || 0) : 0;
        out.push((a << 2) | (b >> 4));
        if (i > s.length) break;
        const c = i < s.length ? (B64_REV[s[i++]] || 0) : 0;
        out.push(((b & 15) << 4) | (c >> 2));
        if (i > s.length) break;
        const d = i < s.length ? (B64_REV[s[i++]] || 0) : 0;
        out.push(((c & 3) << 6) | d);
      }
      return new Uint8Array(out);
    }

    // v2 encoder — prefix "2" + 16-bit high-precision tuning, no tuning events
    function encodeSong(tuningArr, events) {
      const w = new BitWriter();
      // Header: 5 tuning values, 16 bits each (signed fixed-point, ×100)
      for (let i = 0; i < 5; i++) {
        const raw = Math.round((tuningArr[i] || 0) * 100);
        const val = Math.max(0, Math.min(65535, raw + 32768));
        w.write(val, 16);
      }
      // Events: pluck (a=0), mute (a=1), unmute (a=2)
      let prevT = 0;
      for (const ev of events) {
        if (ev.a === 3) continue;
        let dt = Math.round((ev.t - prevT) / 10);
        prevT = ev.t;
        while (dt > 318) {
          w.write(63, 6); w.write(255, 8);
          w.write(14, 4);
          dt -= 318;
        }
        if (dt < 63) {
          w.write(dt, 6);
        } else {
          w.write(63, 6);
          w.write(dt - 63, 8);
        }
        w.write(ev.a * 5 + ev.s, 4);
        if (ev.a === 0) w.write(ev.v || 0, 3);
      }
      return '2' + toBase64Url(w.finish());
    }

    // v1 decoder — old format: 5-bit tuning, supports tuning events
    function decodeSongV1(str) {
      const buf = fromBase64Url(str);
      const r = new BitReader(buf);
      const t = [];
      for (let i = 0; i < 5; i++) t.push(r.read(5) - 12);
      const events = [];
      let absT = 0;
      while (r.hasMore(10)) {
        let dt = r.read(6);
        if (dt === 63) {
          if (!r.hasMore(8 + 4)) break;
          dt += r.read(8);
        }
        absT += dt * 10;
        const combo = r.read(4);
        if (combo < 0) break;
        if (combo === 15) {
          if (!r.hasMore(8)) break;
          const si = r.read(3);
          const semi = r.read(5) - 12;
          events.push({ t: absT, a: 3, s: si, semi });
        } else {
          const action = Math.floor(combo / 5);
          const stringIdx = combo % 5;
          let vel = 0;
          if (action === 0) {
            if (!r.hasMore(3)) break;
            vel = r.read(3);
          }
          events.push({ t: absT, a: action, s: stringIdx, v: vel });
        }
      }
      return { tuning: t, events };
    }

    // v2 decoder — 16-bit high-precision tuning, no tuning events
    function decodeSongV2(str) {
      const buf = fromBase64Url(str);
      const r = new BitReader(buf);
      const t = [];
      for (let i = 0; i < 5; i++) t.push((r.read(16) - 32768) / 100);
      const events = [];
      let absT = 0;
      while (r.hasMore(10)) {
        let dt = r.read(6);
        if (dt === 63) {
          if (!r.hasMore(8 + 4)) break;
          dt += r.read(8);
        }
        absT += dt * 10;
        const combo = r.read(4);
        if (combo < 0) break;
        const action = Math.floor(combo / 5);
        const stringIdx = combo % 5;
        let vel = 0;
        if (action === 0) {
          if (!r.hasMore(3)) break;
          vel = r.read(3);
        }
        events.push({ t: absT, a: action, s: stringIdx, v: vel });
      }
      return { tuning: t, events };
    }

    function decodeSong(str) {
      if (str.startsWith('2')) return decodeSongV2(str.slice(1));
      return decodeSongV1(str);
    }

    const recTimer = document.getElementById('rec-timer');
    let recTimerInterval = null;

    function updateRecTimer() {

    function startRecording() {

    const shareToast = document.getElementById('share-toast');
    let toastTimer;
    function showToast(msg) {

      shareToast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => shareToast.classList.remove('show'), 3000);
    }

    const recBtn = document.getElementById('rec-btn');
    const playBtn = document.getElementById('play-btn');

    recBtn.addEventListener('click', () => {
      if (recording) { stopRecording(); }
      else {
        if (playing) stopSong();
        startRecording();
      }
    });

    // Auto-play song from URL
    let pendingSong = null;
    let currentSong = null; // the song available for play/replay
    let playing = false;
    let playbackTimers = [];

    function parseSongFromUrl() {
      const hash = location.hash;
      if (!hash.startsWith('#s=')) return null;
      const data = hash.slice(3);
      return data ? decodeSong(data) : null;
    }

    function stopSong() {
      for (const t of playbackTimers) clearTimeout(t);
      playbackTimers = [];
      stopAll();
      for (let i = 0; i < 5; i++) { while (stringMuteCount[i] > 0) unmuteString(i); }
      playing = false;
      playBtn.classList.remove('playing');
    }

    function showPlayButton() {
      playBtn.classList.add('visible');
    }

    async function playSong(song) {
      if (playing) stopSong();
      ensureAudio();
      await decodeSamples();

      currentSong = song;
      playing = true;
      showPlayButton();

      // Reset tuning to song's initial state
      for (let i = 0; i < 5; i++) tuning[i] = song.tuning[i];
      saveTuning();
      requestRedraw();

      // Trim leading silence: find first audible event (pluck or mute)
      const firstAudible = song.events.find(ev => ev.a === 0 || ev.a === 1);
      const trimMs = firstAudible ? firstAudible.t : 0;

      // Show playing indicator
      playBtn.classList.add('playing');

      // Schedule playback
      const startDelay = 100;
      let lastEventTime = 0;
      playbackTimers = [];
      for (const ev of song.events) {
        const t = ev.t - trimMs;
        if (t > lastEventTime) lastEventTime = t;
        const timer = setTimeout(() => {
          if (ev.a === 0) pluckString(ev.s, 0.3 + (ev.v || 0) * 0.1);
          else if (ev.a === 1) muteString(ev.s);
          else if (ev.a === 2) unmuteString(ev.s);
          else if (ev.a === 3) { tuning[ev.s] = ev.semi; updatePlaybackRate(ev.s); requestRedraw(); }
        }, t + startDelay);
        playbackTimers.push(timer);
      }

      // Song finished — stop playing state and release any held mutes
      const endTimer = setTimeout(() => {
        for (let i = 0; i < 5; i++) { while (stringMuteCount[i] > 0) unmuteString(i); }
        playing = false;
        playbackTimers = [];
        playBtn.classList.remove('playing');
      }, lastEventTime + startDelay + 2000);
      playbackTimers.push(endTimer);
    }

    playBtn.addEventListener('click', () => {
      if (playing) {
        stopSong();
      } else if (currentSong) {
        playSong(currentSong);
      }
    });

    // ─── Help Popup ──────────────────────────────────────────────
    const helpBtn = document.getElementById('help-btn');
    const helpPopup = document.getElementById('help-popup');

    async function dismissHelp() {
      ensureAudio();
      await decodeSamples();
      helpPopup.classList.remove('open');
      if (pendingSong) {
        currentSong = pendingSong;
        playSong(pendingSong);
        pendingSong = null;
      }
    }

    function restoreHelpPopup() {
      const card = helpPopup.querySelector('.help-card');
      const shared = document.getElementById('shared-song-content');
      if (shared) shared.remove();
      card.querySelectorAll('[data-i18n="title"], ul, .divider, .support-section').forEach(el => el.style.display = '');
      const playBtn = document.getElementById('help-play-btn');
      playBtn.style.width = '';
      applyLocale(currentLocale);
    }

    helpBtn.addEventListener('click', () => {
      restoreHelpPopup();
      helpPopup.classList.toggle('open');
      if (helpPopup.classList.contains('open')) trackEvent('help_open', 'ui');
    });
    document.getElementById('help-play-btn').addEventListener('click', () => {
      trackEvent('play_button', 'ui');
      dismissHelp();
    });
    document.getElementById('help-close-btn').addEventListener('click', () => dismissHelp());
    helpPopup.addEventListener('click', (e) => {
      if (e.target.tagName === 'A') return;
      if (e.target.closest('#locale-switcher')) return;
      dismissHelp();
    });
    // Track outbound link clicks
    document.querySelectorAll('a[target="_blank"]').forEach(a => {
      a.addEventListener('click', () => trackEvent('outbound_click', 'link', a.href));
    });

    helpPopup.addEventListener('touchstart', (e) => {
      if (e.target.tagName !== 'A') e.stopPropagation();
    }, { passive: false });
    helpPopup.addEventListener('touchmove', (e) => e.stopPropagation(), { passive: false });
    helpPopup.addEventListener('mousedown', (e) => e.stopPropagation());

    // ─── Debug UI Init ─────────────────────────────────────────────
    if (debugMode) {
      const panel = document.createElement('div');
      panel.style.cssText = 'position:fixed;top:10px;right:10px;z-index:9999;background:rgba(0,0,0,0.85);color:#fff;padding:12px;border-radius:8px;font:13px monospace;display:flex;flex-direction:column;gap:8px;max-height:90vh;overflow-y:auto;';
      const sliderStyle = 'width:100%;margin:0;';
      const t = instrumentTransform;
      panel.innerHTML = `
        <div style="font-weight:bold;margin-bottom:4px;">Instrument Transform</div>
        <label>Scale: <span id="debug-scale-val">${t.scale.toFixed(2)}</span>
          <input type="range" id="debug-scale" min="0.1" max="3" step="0.01" value="${t.scale}" style="${sliderStyle}">
        </label>
        <label>Offset X: <span id="debug-ox-val">${t.offsetX.toFixed(3)}</span>
          <input type="range" id="debug-ox" min="-0.5" max="0.5" step="0.001" value="${t.offsetX}" style="${sliderStyle}">
        </label>
        <label>Offset Y: <span id="debug-oy-val">${t.offsetY.toFixed(3)}</span>
          <input type="range" id="debug-oy" min="-0.5" max="0.5" step="0.001" value="${t.offsetY}" style="${sliderStyle}">
        </label>
        <label>Rotation: <span id="debug-rot-val">${t.rotation.toFixed(1)}&deg;</span>
          <input type="range" id="debug-rot" min="-180" max="180" step="0.5" value="${t.rotation}" style="${sliderStyle}">
        </label>
        <button id="debug-copy-transform" style="padding:6px;cursor:pointer;border-radius:4px;border:1px solid #555;background:#333;color:#fff;">Copy Transform</button>
        <hr style="border-color:#444;margin:4px 0;">
        <div style="font-weight:bold;">String Positions</div>
        <div><span style="color:#ff3333;">&#9679;</span> Bridge &nbsp; <span style="color:#33ff33;">&#9679;</span> Peg</div>
        <div style="font-size:11px;color:#aaa;">Drag dots to reposition</div>
        <button id="debug-copy" style="padding:6px;cursor:pointer;border-radius:4px;border:1px solid #555;background:#333;color:#fff;">Copy Strings JSON</button>
        <button id="debug-copy-code" style="padding:6px;cursor:pointer;border-radius:4px;border:1px solid #555;background:#333;color:#fff;">Copy Strings Code</button>
        <span id="debug-status" style="color:#0f0;font-size:11px;"></span>
      `;
      document.body.appendChild(panel);
      debugStatus = document.getElementById('debug-status');
      document.getElementById('debug-copy').addEventListener('click', debugCopyPositions);
      document.getElementById('debug-copy-code').addEventListener('click', debugSavePositions);

      // Transform sliders
      const scaleSlider = document.getElementById('debug-scale');
      const oxSlider = document.getElementById('debug-ox');
      const oySlider = document.getElementById('debug-oy');
      const rotSlider = document.getElementById('debug-rot');
      const scaleVal = document.getElementById('debug-scale-val');
      const oxVal = document.getElementById('debug-ox-val');
      const oyVal = document.getElementById('debug-oy-val');
      const rotVal = document.getElementById('debug-rot-val');

      function onTransformChange() {
        instrumentTransform.scale = parseFloat(scaleSlider.value);
        instrumentTransform.offsetX = parseFloat(oxSlider.value);
        instrumentTransform.offsetY = parseFloat(oySlider.value);
        instrumentTransform.rotation = parseFloat(rotSlider.value);
        scaleVal.textContent = instrumentTransform.scale.toFixed(2);
        oxVal.textContent = instrumentTransform.offsetX.toFixed(3);
        oyVal.textContent = instrumentTransform.offsetY.toFixed(3);
        rotVal.textContent = instrumentTransform.rotation.toFixed(1) + '\u00B0';
        computeLayout();
        requestRedraw();
      }
      scaleSlider.addEventListener('input', onTransformChange);
      oxSlider.addEventListener('input', onTransformChange);
      oySlider.addEventListener('input', onTransformChange);
      rotSlider.addEventListener('input', onTransformChange);

      document.getElementById('debug-copy-transform').addEventListener('click', () => {
        const code = `const instrumentTransform = { scale: ${instrumentTransform.scale}, offsetX: ${instrumentTransform.offsetX}, offsetY: ${instrumentTransform.offsetY}, rotation: ${instrumentTransform.rotation} };`;
        navigator.clipboard.writeText(code).then(() => {
          debugStatus.textContent = 'Transform copied!';
          setTimeout(() => { debugStatus.textContent = ''; }, 1500);
        });
      });

      canvas.addEventListener('mousedown', (e) => {
        const rect = canvas.getBoundingClientRect();
        const mx = (e.clientX - rect.left);
        const my = (e.clientY - rect.top);
        const hit = debugHitTest(mx, my);
        if (hit) {
          debugDrag = hit;
          e.stopImmediatePropagation();
          e.preventDefault();
        }
      }, true);

      canvas.addEventListener('mousemove', (e) => {
        if (!debugDrag) return;
        e.stopImmediatePropagation();
        e.preventDefault();
        const b = computeLayout.body;
        if (!b) return;
        const rect = canvas.getBoundingClientRect();
        const mx = (e.clientX - rect.left);
        const my = (e.clientY - rect.top);
        // Inverse of imgToCanvas: canvas coords → image-relative fractions
        const rad = instrumentTransform.rotation * Math.PI / 180;
        const cos = Math.cos(-rad), sin = Math.sin(-rad);
        const dx = mx - (b.imgX + b.imgW / 2);
        const dy = my - (b.imgY + b.imgH / 2);
        const lx = dx * cos - dy * sin;
        const ly = dx * sin + dy * cos;
        const fx = lx / b.imgW + 0.5;
        const fy = ly / b.imgH + 0.5;
        stringPositions[debugDrag.type][debugDrag.index] = { x: fx, y: fy };
        computeLayout();
        requestRedraw();
      }, true);

      canvas.addEventListener('mouseup', (e) => {
        if (debugDrag) {
          debugDrag = null;
          e.stopImmediatePropagation();
          e.preventDefault();
        }
      }, true);
    }

    // ─── Show help popup on first visit / play shared song ────────
    pendingSong = parseSongFromUrl();
    if (pendingSong) {
      // Try auto-play; fall back to shared-song popup if browser blocks audio
      (async () => {
        try {
          ensureAudio();
          await decodeSamples();
          if (audioCtx.state === 'running') {
            currentSong = pendingSong;
            playSong(pendingSong);
            pendingSong = null;
            return;
          }
        } catch (e) { }
        // Browser blocked auto-play — show shared song popup
        showSharedSongPopup();
      })();
    } else {
      helpPopup.classList.add('open');
    }

    function showSharedSongPopup() {
      const card = helpPopup.querySelector('.help-card');
      const strings = i18n[currentLocale];
      // Hide info content, show shared song message
      card.querySelectorAll('[data-i18n="title"], ul, .divider, .support-section').forEach(el => el.style.display = 'none');
      const playBtn = document.getElementById('help-play-btn');
      // Build shared song content
      const wrapper = document.createElement('div');
      wrapper.id = 'shared-song-content';
      wrapper.style.textAlign = 'center';
      wrapper.style.marginTop = '4px';
      wrapper.innerHTML = `
        <div style="font-size: 36px; margin-bottom: 8px;">&#x1F3B6;</div>
        <h2 id="shared-song-title" style="margin: 0 0 10px; font-size: 19px; color: #3a2518;"></h2>
        <p id="shared-song-desc" style="color: #5a4030; font-size: 13.5px; line-height: 1.55; margin: 0 0 4px;"></p>
      `;
      card.insertBefore(wrapper, playBtn);
      document.getElementById('shared-song-title').textContent = strings.sharedSongTitle;
      document.getElementById('shared-song-desc').textContent = strings.sharedSongDesc;
      playBtn.textContent = strings.sharedSongPlay;
      playBtn.style.width = '60%';
      helpPopup.classList.add('open');
    }

    // ─── Prevent browser zoom gestures ─────────────────────────────
    document.addEventListener('gesturestart', (e) => e.preventDefault());
    document.addEventListener('gesturechange', (e) => e.preventDefault());
    document.addEventListener('gestureend', (e) => e.preventDefault());

    // ─── Init ──────────────────────────────────────────────────────
    resize();
    window.addEventListener('resize', resize);
    requestAnimationFrame(animate);
  </script>
</body>

</html>
